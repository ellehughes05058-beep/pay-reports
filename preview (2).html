<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Youfibre Sales · FPH</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f4f6f9;
  --card:#ffffff;
  --border:rgba(15,23,42,0.08);
  --border-md:rgba(15,23,42,0.12);
  --text:#0f172a;
  --muted:#64748b;
  --soft:#94a3b8;

  --blue:#185FA5;
  --blue-bg:#E6F1FB;
  --blue-bd:#B5D4F4;

  --green:#3B6D11;
  --green-bg:#EAF3DE;
  --green-bd:#C0DD97;
  --green-bar:#639922;

  --amber:#854F0B;
  --amber-bg:#FAEEDA;
  --amber-bd:#FAC775;
  --amber-bar:#BA7517;

  --red:#A32D2D;
  --red-bg:#FCEBEB;
  --red-bd:#F7C1C1;
  --red-bar:#E24B4A;
}

html{font-size:15px}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:24px 16px 56px;
  -webkit-font-smoothing:antialiased;
}

.wrap{
  max-width:480px;
  margin:0 auto;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

.brand{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  font-weight:600;
  color:var(--muted);
}

.brand-icon{
  width:24px;
  height:24px;
  background:var(--blue);
  border-radius:7px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.brand-icon svg{
  width:13px;
  height:13px;
  fill:none;
  stroke:#fff;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.live-chip{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-weight:600;
  color:var(--blue);
  background:var(--blue-bg);
  border:0.5px solid var(--blue-bd);
  padding:6px 12px;
  border-radius:999px;
}

.live-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--soft);
}

.live-dot.live{
  background:#22c55e;
  box-shadow:0 0 0 3px rgba(34,197,94,0.18);
  animation:pulse 2s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,0.18)}
  50%{box-shadow:0 0 0 5px rgba(34,197,94,0.08)}
}

/* CARDS */
.card{
  background:var(--card);
  border:0.5px solid var(--border);
  border-radius:16px;
}

/* HERO */
.hero{
  padding:22px 20px 18px;
  margin-bottom:14px;
  animation:fadeUp .3s ease both;
}

.office-pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 10px;
  border-radius:999px;
  background:var(--bg);
  border:0.5px solid var(--border-md);
  color:var(--muted);
  font-size:10px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  margin-bottom:14px;
}

.office-pill-dot{
  width:5px;
  height:5px;
  background:var(--blue);
  border-radius:50%;
}

.hero-name{
  font-size:27px;
  line-height:1.08;
  font-weight:700;
  letter-spacing:-.9px;
  margin-bottom:18px;
}

.hero-sub{
  font-size:12px;
  color:var(--soft);
  font-weight:500;
  margin-top:-10px;
  margin-bottom:18px;
}

.pay-row{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}

.pay-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.13em;
  color:var(--soft);
  font-weight:600;
  margin-bottom:5px;
}

.pay-amount{
  font-size:44px;
  line-height:1;
  font-weight:700;
  letter-spacing:-2.5px;
}

.rate-chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:8px 11px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  white-space:nowrap;
  flex-shrink:0;
  margin-bottom:3px;
}

.rate-chip.good{background:var(--green-bg);color:var(--green);border:0.5px solid var(--green-bd)}
.rate-chip.warn{background:var(--amber-bg);color:var(--amber);border:0.5px solid var(--amber-bd)}
.rate-chip.bad{background:var(--red-bg);color:var(--red);border:0.5px solid var(--red-bd)}

.hero-divider{
  height:.5px;
  background:var(--border);
  margin-bottom:14px;
}

.conv-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.conv-label{
  font-size:12px;
  font-weight:600;
  color:var(--muted);
}

.conv-pct{
  font-size:12px;
  font-weight:700;
  color:var(--text);
}

.conv-track{
  height:5px;
  background:var(--bg);
  border-radius:999px;
  overflow:hidden;
}

.conv-fill{
  height:100%;
  width:0%;
  border-radius:999px;
  transition:width 1s cubic-bezier(.16,1,.3,1);
}

.conv-fill.good{background:var(--green-bar)}
.conv-fill.warn{background:var(--amber-bar)}
.conv-fill.bad{background:var(--red-bar)}

/* SELECTOR */
.selector{
  margin-bottom:14px;
  animation:fadeUp .35s ease both;
}

.section-label,
.selector-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--soft);
  font-weight:700;
  margin:0 0 9px;
}

.locked-agent,
select{
  width:100%;
  background:var(--card);
  border:0.5px solid var(--border-md);
  border-radius:14px;
  padding:13px 14px;
  font-family:'Inter',sans-serif;
  font-size:13.5px;
  font-weight:600;
  color:var(--text);
  outline:none;
}

.select-wrap{
  position:relative;
}

select{
  appearance:none;
  -webkit-appearance:none;
  cursor:pointer;
  padding-right:36px;
}

.select-arrow{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--soft);
  pointer-events:none;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-bottom:14px;
}

.stat{
  padding:16px 14px 14px;
}

.stat-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--soft);
  font-weight:700;
  margin-bottom:6px;
}

.stat-val{
  font-size:30px;
  font-weight:700;
  letter-spacing:-1px;
  color:var(--text);
  line-height:1;
}

.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}
.stat-val.red{color:var(--red)}

.stat-sub{
  font-size:11px;
  color:var(--soft);
  font-weight:500;
  margin-top:5px;
}

/* SECTIONS */
.section{
  margin-bottom:14px;
  animation:fadeUp .4s ease both;
}

.count-pill{
  display:inline-flex;
  align-items:center;
  padding:3px 8px;
  border-radius:999px;
  background:var(--card);
  border:0.5px solid var(--border-md);
  color:var(--muted);
  font-size:10px;
  font-weight:700;
  margin-left:6px;
}

/* PACKAGE */
.pkg-card{
  padding:15px;
}

.pkg-item{
  margin-bottom:13px;
}

.pkg-item:last-child{
  margin-bottom:0;
}

.pkg-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12.5px;
  margin-bottom:6px;
}

.pkg-name{
  color:var(--text);
  font-weight:600;
}

.pkg-count{
  color:var(--muted);
  font-weight:700;
}

.pkg-track{
  height:5px;
  background:var(--bg);
  border-radius:999px;
  overflow:hidden;
}

.pkg-fill{
  height:100%;
  border-radius:999px;
  background:var(--blue);
  transition:width .7s cubic-bezier(.16,1,.3,1);
}

/* LEAD CARDS */
.leads-card{
  overflow:hidden;
}

.sale-card{
  display:block;
  padding:13px 15px;
  border-bottom:.5px solid var(--border);
  background:var(--card);
}

.sale-card:last-child{
  border-bottom:none;
}

.sale-card.cancelled-card{
  background:linear-gradient(0deg,rgba(252,235,235,.55),rgba(255,255,255,1));
}

.sale-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  margin-bottom:7px;
}

.sale-addr{
  font-size:13.5px;
  font-weight:600;
  color:var(--text);
  line-height:1.35;
  flex:1;
}

.sale-meta{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  align-items:center;
}

.badge{
  font-size:10px;
  font-weight:700;
  padding:4px 8px;
  border-radius:999px;
  white-space:nowrap;
}

.badge-paid{
  background:var(--green-bg);
  color:var(--green);
  border:0.5px solid var(--green-bd);
}

.badge-unpaid{
  background:var(--amber-bg);
  color:var(--amber);
  border:0.5px solid var(--amber-bd);
}

.badge-cancelled{
  background:var(--red-bg);
  color:var(--red);
  border:0.5px solid var(--red-bd);
}

.meta-chip{
  font-size:11px;
  color:var(--muted);
  background:var(--bg);
  border:0.5px solid var(--border);
  border-radius:999px;
  padding:3px 8px;
  font-weight:500;
}

.cancel-reason{
  background:var(--red-bg);
  color:var(--red);
  border-color:var(--red-bd);
}

.agent-tag{
  font-size:11px;
  color:var(--soft);
  font-weight:600;
}

/* ALL LEADS */
.all-leads-toggle{
  width:100%;
  background:var(--card);
  border:0.5px solid var(--border-md);
  border-radius:14px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:13.5px;
  font-weight:600;
  padding:14px 15px;
  margin-bottom:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.search-wrap{
  position:relative;
  margin-bottom:9px;
}

.search-input{
  width:100%;
  padding:11px 12px;
  border:0.5px solid var(--border-md);
  border-radius:12px;
  font-family:'Inter',sans-serif;
  font-size:13.5px;
  background:var(--card);
  color:var(--text);
  outline:none;
}

.search-input:focus{
  border-color:var(--blue);
}

.hidden{
  display:none;
}

/* STATES */
.state-center,
.loading{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:50vh;
  gap:14px;
  color:var(--muted);
  font-size:14px;
  font-weight:500;
  text-align:center;
}

.spinner{
  width:28px;
  height:28px;
  border:2px solid var(--border-md);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .75s linear infinite;
}

.error-box{
  margin-top:14px;
  padding:16px;
  background:var(--card);
  border:0.5px solid var(--border);
  border-radius:16px;
  font-size:13px;
  color:var(--muted);
  line-height:1.6;
}

.empty{
  padding:24px 16px;
  text-align:center;
  font-size:13px;
  color:var(--soft);
}

.footer{
  margin-top:28px;
  text-align:center;
  font-size:11.5px;
  color:var(--soft);
  font-weight:500;
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:400px){
  .pay-amount{font-size:38px}
  .hero-name{font-size:24px}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </div>
      Youfibre Sales
    </div>

    <div class="live-chip">
      <div class="live-dot" id="status-dot"></div>
      <span id="status-text">Loading</span>
    </div>
  </div>

  <div id="hero-wrap">
    <section class="hero card">
      <div class="office-pill">
        <span class="office-pill-dot"></span>
        Sales Dashboard
      </div>

      <div class="hero-name" id="banner-title">FPH</div>
      <div class="hero-sub" id="banner-sub">Loading data…</div>

      <div class="hero-divider"></div>

      <div class="conv-header">
        <span class="conv-label">Dashboard status</span>
        <span class="conv-pct">Fetching</span>
      </div>

      <div class="conv-track">
        <div class="conv-fill good" style="width:40%"></div>
      </div>
    </section>
  </div>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      Fetching your data…
    </div>
  </div>

</div>

<script>
const CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vTLo8Ctb7pJ2vrNZMxC6_nhak9vQ1XZ0YGVNcJav85LvQ4Mtpw_2VxrCZhwsHSiy7uNIIGLjoqH_77V/pub?gid=0&single=true&output=csv';

let allRows=[],agents=[];

const urlParams=new URLSearchParams(window.location.search);
const officeFilter=urlParams.get('office')||null;
const agentFilter=urlParams.get('agent')||null;
const lockedAgentMode=!!agentFilter;

function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));

  return lines.slice(1).map(line=>{
    const vals=[];
    let cur='',inQ=false;

    for(let ch of line){
      if(ch==='"')inQ=!inQ;
      else if(ch===','&&!inQ){
        vals.push(cur.trim());
        cur='';
      } else {
        cur+=ch;
      }
    }

    vals.push(cur.trim());

    const row={};
    headers.forEach((h,i)=>row[h]=(vals[i]||'').replace(/^"|"$/g,''));
    return row;
  }).filter(r=>Object.values(r).some(v=>v));
}

function getVal(r,names){
  for(const n of names){
    if(r[n]!==undefined&&r[n]!=='')return r[n];
  }
  return '';
}

function isPaid(r){
  const v=getVal(r,['Paid?','paid?','Paid','paid']).toLowerCase().trim();
  return v!==''&&v!=='no'&&v!=='false'&&v!=='0';
}

function isCancelled(r){
  const v=getVal(r,['Cancelled?','cancelled?','Cancelled','cancelled']).toLowerCase().trim();
  return v==='yes'||v==='y'||v==='true'||v==='1';
}

function cancellationReason(r){
  return getVal(r,['Cancellation Reason','cancellation reason','Cancellation reason','cancellation Reason']);
}

function leadCard(r,isAll){
  const paid=isPaid(r);
  const cancelled=isCancelled(r);
  const reason=cancellationReason(r);

  const addr=r['Address']||'—';
  const pc=r['Postcode']||'';
  const pkg=r['Package']||'';
  const date=r['Date submited']||r['Date submitted']||'';
  const office=r['Office']||'';
  const agentName=r['Agent']||'';
  const customer=r['Customer Name']||r['Name']||'';

  const searchText=[
    customer,addr,pc,pkg,date,office,agentName,
    paid?'paid':'unpaid',
    cancelled?'cancelled':'',
    reason
  ].join(' ').toLowerCase();

  return `
    <div class="sale-card ${cancelled?'cancelled-card':''}" data-search="${searchText}">
      <div class="sale-top">
        <span class="sale-addr">${customer?customer+' · ':''}${addr}${pc?', '+pc:''}</span>
        ${
          cancelled
          ? `<span class="badge badge-cancelled">Cancelled</span>`
          : `<span class="badge ${paid?'badge-paid':'badge-unpaid'}">${paid?'Paid':'Unpaid'}</span>`
        }
      </div>

      <div class="sale-meta">
        ${pkg?`<span class="meta-chip">${pkg}</span>`:''}
        ${date?`<span class="meta-chip">${date}</span>`:''}
        ${office?`<span class="meta-chip">${office}</span>`:''}
        ${cancelled&&reason?`<span class="meta-chip cancel-reason">${reason}</span>`:''}
        ${isAll&&agentName?`<span class="agent-tag">${agentName}</span>`:''}
      </div>
    </div>
  `;
}

function updateHero(label, sub, total, paidCount, cancelledCount){
  const paidRate=total?Math.round((paidCount/total)*100):0;
  const cancelRate=total?Math.round((cancelledCount/total)*100):0;

  const state=cancelRate>=30?'bad':paidRate>=70?'good':'warn';

  document.getElementById('hero-wrap').innerHTML=`
    <section class="hero card">
      <div class="office-pill">
        <span class="office-pill-dot"></span>
        Sales Dashboard
      </div>

      <div class="hero-name">${label}</div>
      <div class="hero-sub">${sub}</div>

      <div class="pay-row">
        <div>
          <div class="pay-label">Total sales</div>
          <div class="pay-amount">${total}</div>
        </div>

        <div class="rate-chip ${state}">
          ${paidRate}% paid
        </div>
      </div>

      <div class="hero-divider"></div>

      <div class="conv-header">
        <span class="conv-label">Paid sales rate</span>
        <span class="conv-pct">${paidRate}%</span>
      </div>

      <div class="conv-track">
        <div class="conv-fill ${state}" id="hero-fill"></div>
      </div>
    </section>
  `;

  setTimeout(()=>{
    const fill=document.getElementById('hero-fill');
    if(fill)fill.style.width=paidRate+'%';
  },80);
}

function render(agent){
  const officeRows=officeFilter
    ? allRows.filter(r=>(r['Office']||'').toLowerCase().trim()===officeFilter.toLowerCase().trim())
    : allRows;

  const agentExists=agents.includes(agent);
  const activeAgent=agentExists?agent:'__all__';

  const rows=activeAgent==='__all__'
    ? officeRows
    : officeRows.filter(r=>r['Agent']===activeAgent);

  const total=rows.length;
  const paidCount=rows.filter(r=>isPaid(r)&&!isCancelled(r)).length;
  const cancelledCount=rows.filter(isCancelled).length;
  const unpaidCount=rows.filter(r=>!isPaid(r)&&!isCancelled(r)).length;

  const label=activeAgent==='__all__'
    ? (officeFilter?officeFilter:'FPH')
    : activeAgent;

  const sub='Sales dashboard · '+new Date().toLocaleDateString('en-GB',{
    weekday:'long',
    day:'numeric',
    month:'long'
  });

  updateHero(label,sub,total,paidCount,cancelledCount);

  const pkgCounts={};
  rows.forEach(r=>{
    const p=r['Package']||'Unknown';
    pkgCounts[p]=(pkgCounts[p]||0)+1;
  });

  const topPkg=Object.entries(pkgCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const recent=[...rows].reverse().slice(0,12);
  const allLeads=[...rows].reverse();
  const isAll=activeAgent==='__all__';

  let html='';

  if(lockedAgentMode){
    html+=`
      <div class="selector">
        <div class="selector-label">Agent view</div>
        <div class="locked-agent">${activeAgent==='__all__'?agentFilter:activeAgent}</div>
      </div>
    `;
  } else {
    html+=`
      <div class="selector">
        <div class="selector-label">${officeFilter?officeFilter+' · Agent':'Viewing'}</div>
        <div class="select-wrap">
          <select id="ag">
            <option value="__all__" ${activeAgent==='__all__'?'selected':''}>All agents</option>
            ${agents.map(a=>`<option value="${a}" ${a===activeAgent?'selected':''}>${a}</option>`).join('')}
          </select>
          <div class="select-arrow">▾</div>
        </div>
      </div>
    `;
  }

  html+=`
    <div class="stats">
      <div class="stat card">
        <div class="stat-label">Total sales</div>
        <div class="stat-val">${total}</div>
        <div class="stat-sub">${isAll?agents.length+' agents':activeAgent}</div>
      </div>

      <div class="stat card">
        <div class="stat-label">Paid</div>
        <div class="stat-val green">${paidCount}</div>
        <div class="stat-sub">${total?Math.round(paidCount/total*100):0}% of total</div>
      </div>

      <div class="stat card">
        <div class="stat-label">Unpaid</div>
        <div class="stat-val amber">${unpaidCount}</div>
        <div class="stat-sub">${total?Math.round(unpaidCount/total*100):0}% of total</div>
      </div>

      <div class="stat card">
        <div class="stat-label">Cancelled</div>
        <div class="stat-val red">${cancelledCount}</div>
        <div class="stat-sub">${total?Math.round(cancelledCount/total*100):0}% of total</div>
      </div>
    </div>
  `;

  if(topPkg.length){
    html+=`
      <div class="section">
        <div class="section-label">Packages</div>

        <div class="pkg-card card">
          ${topPkg.map(([pkg,count])=>`
            <div class="pkg-item">
              <div class="pkg-row">
                <span class="pkg-name">${pkg}</span>
                <span class="pkg-count">${count}</span>
              </div>

              <div class="pkg-track">
                <div class="pkg-fill" style="width:${Math.round(count/total*100)}%"></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  html+=`
    <div class="section">
      <div class="section-label">
        Recent sales <span class="count-pill">${recent.length}</span>
      </div>

      <div class="leads-card card">
        ${recent.length===0?`<div class="empty">No sales found</div>`:recent.map(r=>leadCard(r,isAll)).join('')}
      </div>
    </div>

    <div class="section">
      <button class="all-leads-toggle" id="toggleLeads">
        <span>View all leads</span>
        <span id="toggleIcon">▾</span>
      </button>

      <div id="allLeadsBox" class="hidden">
        <div class="search-wrap">
          <input class="search-input" id="leadSearch" type="text" placeholder="Search name, address, postcode, package, agent…">
        </div>

        <div class="section-label">
          All leads <span class="count-pill" id="allLeadCount">${allLeads.length}</span>
        </div>

        <div class="leads-card card" id="allLeadsList">
          ${allLeads.length===0?`<div class="empty">No leads found</div>`:allLeads.map(r=>leadCard(r,isAll)).join('')}
        </div>
      </div>
    </div>

    <div class="footer">Updated live from Google Sheets</div>
  `;

  document.getElementById('app').innerHTML=html;

  if(!lockedAgentMode){
    document.getElementById('ag').addEventListener('change',e=>{
      const sel=e.target.value;
      const newUrl=new URL(window.location.href);

      if(sel==='__all__')newUrl.searchParams.delete('agent');
      else newUrl.searchParams.set('agent',sel);

      window.history.replaceState({},'',newUrl);
      render(sel);
    });
  }

  document.getElementById('toggleLeads').addEventListener('click',()=>{
    const box=document.getElementById('allLeadsBox');
    const icon=document.getElementById('toggleIcon');

    box.classList.toggle('hidden');
    icon.textContent=box.classList.contains('hidden')?'▾':'▴';
  });

  document.getElementById('leadSearch').addEventListener('input',e=>{
    const term=e.target.value.toLowerCase().trim();
    const cards=document.querySelectorAll('#allLeadsList .sale-card');
    let visible=0;

    cards.forEach(card=>{
      const match=card.dataset.search.includes(term);
      card.style.display=match?'':'none';
      if(match)visible++;
    });

    document.getElementById('allLeadCount').textContent=visible;
  });
}

fetch(CSV)
  .then(r=>{
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.text();
  })
  .then(text=>{
    allRows=parseCSV(text);

    const officeRows=officeFilter
      ? allRows.filter(r=>(r['Office']||'').toLowerCase().trim()===officeFilter.toLowerCase().trim())
      : allRows;

    const set=new Set(officeRows.map(r=>r['Agent']).filter(Boolean));
    agents=[...set].sort();

    document.getElementById('status-dot').classList.add('live');
    document.getElementById('status-text').textContent='Live';

    if(officeFilter)document.title=officeFilter+' · Youfibre Sales';

    render(agentFilter||'__all__');
  })
  .catch(err=>{
    document.getElementById('status-text').textContent='Error';

    document.getElementById('app').innerHTML=`
      <div class="error-box">
        Couldn't load data. Make sure the sheet is still published to web.
        <br><br>
        <code style="font-size:11px;opacity:.6">${err.message}</code>
      </div>
    `;
  });
</script>

</body>
</html>
